stages:
  - validate
  - build
  - integration

variables:
  MONITORING_IMAGE: $REGISTRY_HOST/bookstore/monitoring

validate-compose:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - cp .env.example .env
    - docker compose config

build-monitoring:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$MONITORING_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$MONITORING_IMAGE:latest" ./monitoring
    - docker push "$MONITORING_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$MONITORING_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

integration:
  stage: integration
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
    - apk add --no-cache curl
  script:
    - |
      cat > .env.ci << 'EOF'
      LETSENCRYPT_EMAIL=test@test.com
      BOOKSTORE_DOMAIN=localhost
      POSTGRES_DB=testdb
      POSTGRES_USER=testuser
      POSTGRES_PASSWORD=testpass
      JWT_SECRET=ci-jwt-secret-min-32-characters-ok
      JWT_ALGORITHM=HS256
      SESSION_SECRET=ci-session-secret-min-32-chars-ok
      CATALOG_PORT=5001
      ORDER_PORT=5002
      AUTH_PORT=5003
      FRONTEND_PORT=3000
      EOF
      echo "REGISTRY_HOST=$REGISTRY_HOST" >> .env.ci
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci up -d postgres redis
    - |
      echo "=== Waiting for postgres to be healthy ==="
      for i in $(seq 1 20); do
        docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci exec -T postgres \
          psql -U testuser -d testdb -c "SELECT COUNT(*) FROM books" 2>/dev/null && break
        echo "[$i/20] Postgres not ready, waiting 3s..."
        sleep 3
      done
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci up -d catalog-service order-service login-service frontend
    - |
      echo "=== Waiting for services to be ready ==="
      for svc in "docker:5001/health" "docker:5002/health" "docker:5003/health" "docker:3000/health"; do
        for i in $(seq 1 30); do
          curl -sf "http://$svc" && echo "$svc OK" && break
          echo "[$i/30] http://$svc not ready, waiting 3s..."
          sleep 3
          if [ "$i" = "30" ]; then
            echo "=== TIMEOUT: $svc — printing logs ==="
            docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci logs
            exit 1
          fi
        done
      done
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci down -v
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
