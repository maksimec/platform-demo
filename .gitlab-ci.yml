stages:
  - validate
  - build
  - integration

variables:
  MONITORING_IMAGE: $REGISTRY_HOST/bookstore/monitoring
  COMPOSE_CMD: "docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env.ci"

validate-compose:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - cp .env.example .env
    - docker compose config --quiet
    - |
      echo "=== Validating .env.example has all required variables ==="
      for var in LETSENCRYPT_EMAIL BOOKSTORE_DOMAIN POSTGRES_DB POSTGRES_USER \
                 POSTGRES_PASSWORD JWT_SECRET JWT_ALGORITHM SESSION_SECRET \
                 FRONTEND_PORT CATALOG_PORT ORDER_PORT AUTH_PORT; do
        grep -q "^${var}=" .env.example || { echo "MISSING: ${var}"; exit 1; }
      done
      echo "All required variables present"

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck monitoring/*.sh

build-monitoring:
  stage: build
  needs:
    - validate-compose
    - shellcheck
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$MONITORING_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$MONITORING_IMAGE:latest" ./monitoring
    - docker push "$MONITORING_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$MONITORING_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

integration:
  stage: integration
  needs:
    - validate-compose
    - shellcheck
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
  script:
    - |
      cat > .env.ci << 'EOF'
      LETSENCRYPT_EMAIL=test@test.com
      BOOKSTORE_DOMAIN=localhost
      POSTGRES_DB=testdb
      POSTGRES_USER=testuser
      POSTGRES_PASSWORD=testpass
      JWT_SECRET=ci-jwt-secret-min-32-characters-ok
      JWT_ALGORITHM=HS256
      SESSION_SECRET=ci-session-secret-min-32-chars-ok
      CATALOG_PORT=5001
      ORDER_PORT=5002
      AUTH_PORT=5003
      FRONTEND_PORT=3000
      EOF
      echo "REGISTRY_HOST=$REGISTRY_HOST" >> .env.ci

    - $COMPOSE_CMD up -d postgres redis

    - |
      echo "=== Waiting for postgres ==="
      for i in $(seq 1 20); do
        STATUS=$(docker inspect --format='{{.State.Health.Status}}' bookstore-postgres 2>/dev/null || true)
        [ "$STATUS" = "healthy" ] && echo "postgres healthy" && break
        echo "[$i/20] postgres status=${STATUS:-n/a}, waiting 3s..."
        sleep 3
        if [ "$i" = "20" ]; then
          echo "=== TIMEOUT: postgres ==="
          $COMPOSE_CMD logs postgres
          exit 1
        fi
      done

    - $COMPOSE_CMD up -d catalog-service order-service login-service frontend

    - |
      echo "=== Waiting for application services ==="
      for svc in catalog-service order-service login-service frontend; do
        cname=$($COMPOSE_CMD ps -q "$svc" 2>/dev/null | head -1)
        if [ -z "$cname" ]; then
          echo "ERROR: cannot resolve container ID for $svc"
          $COMPOSE_CMD logs "$svc"
          exit 1
        fi
        for i in $(seq 1 30); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$cname" 2>/dev/null || true)
          [ "$STATUS" = "healthy" ] && echo "$svc is healthy" && break
          echo "[$i/30] $svc status=${STATUS:-n/a}, waiting 3s..."
          sleep 3
          if [ "$i" = "30" ]; then
            echo "=== TIMEOUT: $svc ==="
            $COMPOSE_CMD logs "$svc"
            exit 1
          fi
        done
      done

    - echo "=== All services healthy — integration passed ==="
    - $COMPOSE_CMD down -v
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
