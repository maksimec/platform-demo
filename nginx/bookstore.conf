upstream bookstore_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream bookstore_catalog {
    server catalog-service:5001;
    keepalive 32;
}

upstream bookstore_orders {
    server order-service:5002;
    keepalive 32;
}

upstream bookstore_auth {
    server login-service:5003;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location ^~ /admin/includes {
        deny all;
        return 404;
    }

    location ^~ /admin {
        alias /var/www/admin;
        index index.php;
        try_files $uri $uri/ @admin_php;

        location ~ ^/admin(.+\.php)$ {
            fastcgi_pass         admin-fpm:9000;
            fastcgi_index        index.php;
            fastcgi_param        SCRIPT_FILENAME /var/www/admin$1;
            include              fastcgi_params;
            fastcgi_read_timeout 30s;
            fastcgi_param        HTTP_X_REAL_IP        $remote_addr;
            fastcgi_param        HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
            fastcgi_param        HTTP_X_FORWARDED_PROTO $scheme;
        }
    }

    location @admin_php {
        rewrite ^/admin(/.*)?$ /admin/index.php$1 last;
    }

    location ^~ /api/catalog/ {
        rewrite ^/api/catalog/(.*) /$1 break;
        proxy_pass         http://bookstore_catalog;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /api/orders/ {
        rewrite ^/api/orders/(.*) /$1 break;
        proxy_pass         http://bookstore_orders;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /api/auth/ {
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass         http://bookstore_auth;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://bookstore_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    access_log /var/log/nginx/bookstore.access.log combined;
    error_log  /var/log/nginx/bookstore.error.log  warn;
}
